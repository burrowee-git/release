# release.burrowee.com — public install channel (static)
#
# Serves the static surface mirrored by tools/release.sh to STATIC_DIR:
#   index.html, burrowee-release.pub, <comp>/install.sh, skills/<name>/SKILL.md
#
# Host: nsm.renative.com (also fronts console / umbree / burree). Behind
# Cloudflare in Full (strict) mode — origin presents a real cert, CF connects
# over TLS and validates it. See ops/README.md for operator activation.
#
# DEPLOY LOCATION (nsm specifics — see ops/README.md):
#   This host's nginx.conf includes ONLY /etc/nginx/sites-enabled/* — it does
#   NOT include /etc/nginx/conf.d/*.conf. Drop this file into
#   /etc/nginx/sites-enabled/ (the .conf extension is fine there). A copy under
#   conf.d/ is SILENTLY IGNORED.
#   This host's nginx build also rejects TLSv1.3 — keep ssl_protocols at TLSv1.2.
#   Do NOT mark this server default_server: another sites-enabled file already
#   owns default_server on :443.

server {
    listen 80;
    listen [::]:80;
    server_name release.burrowee.com;

    # Cloudflare handles the public redirect; this is a belt-and-suspenders
    # bounce for any direct-to-origin http hit.
    return 301 https://release.burrowee.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name release.burrowee.com;

    # === TLS — OPERATOR PLACEHOLDERS ===========================================
    # Issue/point these at the host cert for release.burrowee.com, then reload.
    # (Mirror the console vhost on this host.) On nsm, ONLY TLSv1.2 is accepted.
    ssl_certificate     /etc/letsencrypt/live/release.burrowee.com/fullchain.pem;  # OPERATOR: set real path
    ssl_certificate_key /etc/letsencrypt/live/release.burrowee.com/privkey.pem;    # OPERATOR: set real path
    ssl_protocols       TLSv1.2;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    # ===========================================================================

    # Static root — must match release.sh STATIC_DIR.
    root  /ebs_storage/apps/release.burrowee.com/static;
    index index.html;

    server_tokens off;
    charset utf-8;

    # Inner-loop hygiene: the install one-liners are piped into `sh`, so the
    # served bytes must be exact. No transforms, short cache.
    location / {
        try_files $uri $uri/ =404;
    }

    # Bootstrap installers: served as a shell script so `curl … | sh` is honest
    # about the content type, and never cached stale at the edge for long.
    location ~ \.sh$ {
        default_type  text/x-shellscript;
        add_header    Cache-Control "public, max-age=300";
        try_files     $uri =404;
    }

    # The signing public key — plain text, the trust anchor for manual verify.
    location = /burrowee-release.pub {
        default_type  text/plain;
        add_header    Cache-Control "public, max-age=300";
    }

    # Agent skill packages — markdown.
    location ~ ^/skills/.+/SKILL\.md$ {
        default_type  text/markdown;
        add_header    Cache-Control "public, max-age=300";
        try_files     $uri =404;
    }

    # SHA256SUMS / signatures if ever served from the static surface — plain text.
    location ~ \.(txt|minisig)$ {
        default_type  text/plain;
        try_files     $uri =404;
    }

    # ---------------------------------------------------------------------------
    # relay-gate proxy — signature-gated relay release channel
    #
    # /relay/challenge   — unauthenticated nonce endpoint (no auth headers needed)
    # /relay/release/    — gated downloads; client must send the 3 auth headers
    # /relay/install.sh  — static, ungated bootstrap installer (served from root)
    #
    # WHY ^~ on /relay/release/:
    #   Without ^~, nginx's regex locations (~ \.sh$ and ~ \.(txt|minisig)$) take
    #   priority over a plain prefix match. Gated files under /relay/release/ have
    #   extensions like .sh, .txt, and .minisig — they would be served STATICALLY
    #   from the root, bypassing the gate entirely (or returning 404). The ^~ prefix
    #   modifier stops regex evaluation for any URI that matches this prefix, so ALL
    #   paths under /relay/release/ route to the gate regardless of extension.
    # ---------------------------------------------------------------------------

    location = /relay/challenge {
        proxy_pass         http://127.0.0.1:8077;
        proxy_set_header   X-Forwarded-For $remote_addr;
    }

    # ^~ is REQUIRED — see comment above.
    location ^~ /relay/release/ {
        proxy_pass         http://127.0.0.1:8077;
        proxy_set_header   X-Forwarded-For    $remote_addr;
        proxy_set_header   X-Burrowee-Key-FP  $http_x_burrowee_key_fp;
        proxy_set_header   X-Burrowee-Nonce   $http_x_burrowee_nonce;
        proxy_set_header   X-Burrowee-Sig     $http_x_burrowee_sig;
    }

    # /relay/install.sh is static and ungated. The ~ \.sh$ regex above already
    # serves it correctly from the static root; this explicit block is for clarity.
    location = /relay/install.sh {
        default_type  text/x-shellscript;
        add_header    Cache-Control "public, max-age=300";
        try_files     $uri =404;
    }
}
